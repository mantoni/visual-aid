name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v. Defaults to the repository version.
        required: false
        type: string
      release_mode:
        description: Whether the release should be public, draft, or pre-release.
        required: true
        default: draft
        type: choice
        options:
          - stable
          - draft
          - prerelease

jobs:
  prepare:
    name: Prepare release plan
    runs-on: ubuntu-latest
    outputs:
      draft: ${{ steps.plan.outputs.draft }}
      prerelease: ${{ steps.plan.outputs.prerelease }}
      platforms: ${{ steps.plan.outputs.platforms }}
      release_name: ${{ steps.plan.outputs.release_name }}
      tag: ${{ steps.plan.outputs.tag }}
      version: ${{ steps.plan.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute release plan
        id: plan
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          RELEASE_MODE: ${{ inputs.release_mode || 'stable' }}
        run: |
          flags=()
          if [ -n "$INPUT_VERSION" ]; then
            flags+=(--version "$INPUT_VERSION")
          fi
          if [ "$RELEASE_MODE" = "draft" ]; then
            flags+=(--draft)
          elif [ "$RELEASE_MODE" = "prerelease" ]; then
            flags+=(--prerelease)
          fi

          plan_json=$(npm run --silent release:plan -- --github-ref "$GITHUB_REF" "${flags[@]}")

          {
            echo 'plan<<EOF'
            echo "$plan_json"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "draft=$(printf '%s' "$plan_json" | jq -r '.draft')" >> "$GITHUB_OUTPUT"
          echo "prerelease=$(printf '%s' "$plan_json" | jq -r '.prerelease')" >> "$GITHUB_OUTPUT"
          echo "platforms=$(printf '%s' "$plan_json" | jq -c '.platforms')" >> "$GITHUB_OUTPUT"
          echo "release_name=$(printf '%s' "$plan_json" | jq -r '.releaseName')" >> "$GITHUB_OUTPUT"
          echo "tag=$(printf '%s' "$plan_json" | jq -r '.tag')" >> "$GITHUB_OUTPUT"
          echo "version=$(printf '%s' "$plan_json" | jq -r '.version')" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform.id }} bundles
    needs: prepare
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.prepare.outputs.platforms) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.platform.id == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundles
        run: npm run tauri:build

      - name: Upload macOS release assets
        if: matrix.platform.id == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.id }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload Linux release assets
        if: matrix.platform.id == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.id }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - name: Upload Windows release assets
        if: matrix.platform.id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.id }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v5
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          draft: ${{ needs.prepare.outputs.draft == 'true' }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: dist/release/**/*
